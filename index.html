<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>少爺紐西蘭15雪山湖區精緻靜心遊</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #334155; }
        .tab-btn.active { border-bottom: 4px solid #3b82f6; color: #1d4ed8; font-weight: 700; }
        .chart-container { position: relative; width: 100%; max-width: 1000px; margin: 0 auto; height: 450px; }
        .daily-map-container { position: relative; width: 100%; height: 400px; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .basecamp-marker { background-color: #2563eb; color: white; border-radius: 50%; border: 2px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .day-selector-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .ai-btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; transition: all 0.2s; border-radius: 0.75rem; font-weight: 700; }
        .ai-box { background-color: #f5f3ff; border: 1px solid #ede9fe; border-radius: 0.75rem; padding: 1.25rem; font-size: 0.875rem; color: #4c1d95; margin-top: 1rem; line-height: 1.7; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid white; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            #sec-table table, #sec-table thead, #sec-table tbody, #sec-table th, #sec-table td, #sec-table tr { display: block; }
            #sec-table thead tr { position: absolute; top: -9999px; left: -9999px; }
            #sec-table tr { margin-bottom: 1.5rem; border: 1px solid #e2e8f0; border-radius: 1rem; background-color: white; padding: 0.5rem; }
            #sec-table td { border: none; border-bottom: 1px solid #f1f5f9; position: relative; padding: 0.75rem 1rem 0.75rem 4.5rem !important; }
            #sec-table td:before { position: absolute; left: 1rem; width: 3rem; font-weight: 700; color: #64748b; font-size: 0.75rem; }
            #sec-table td:nth-of-type(1):before { content: "日期"; }
            #sec-table td:nth-of-type(2):before { content: "地點"; }
            #sec-table td:nth-of-type(3):before { content: "行程"; }
            #sec-table td:nth-of-type(4):before { content: "氣候"; }
            #sec-table td:nth-of-type(5):before { content: "住宿"; }
        }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen text-slate-700">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <h1 class="text-xl font-black text-slate-800">❄️ 少爺紐西蘭15雪山湖區精緻靜心遊</h1>
            <nav class="flex space-x-1 mt-4 overflow-x-auto w-full pb-1">
                <button onclick="switchTab('map')" id="tab-map" class="tab-btn active px-3 py-2 text-sm font-bold whitespace-nowrap">總覽地圖</button>
                <button onclick="switchTab('daily')" id="tab-daily" class="tab-btn px-3 py-2 text-sm font-bold whitespace-nowrap">每日路線</button>
                <button onclick="switchTab('table')" id="tab-table" class="tab-btn px-3 py-2 text-sm font-bold whitespace-nowrap">每日總表</button>
                <button onclick="switchTab('stay')" id="tab-stay" class="tab-btn px-3 py-2 text-sm font-bold whitespace-nowrap">住宿詳情</button>
                <button onclick="switchTab('food')" id="tab-food" class="tab-btn px-3 py-2 text-sm font-bold whitespace-nowrap">餐飲攻略</button>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-6 w-full">
        <!-- Section: Map -->
        <section id="sec-map" class="fade-in block">
            <div class="bg-white rounded-2xl shadow-md p-6 border mb-8">
                <h2 class="font-bold mb-4">🗺️ 放射狀定點住宿策略</h2>
                <div class="chart-container border rounded-2xl overflow-hidden shadow-inner">
                    <div id="overviewMap" style="width: 100%; height: 100%;"></div>
                </div>
            </div>
        </section>

        <!-- Section: Daily -->
        <section id="sec-daily" class="fade-in hidden">
            <div class="bg-white rounded-2xl shadow-md p-6 border">
                <div class="flex overflow-x-auto py-2 mb-4 space-x-2" id="day-selector-container"></div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-1 bg-slate-50 border rounded-2xl p-6 flex flex-col">
                        <span id="daily-badge" class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded font-bold w-fit mb-2"></span>
                        <h3 id="daily-title" class="text-xl font-black mb-3"></h3>
                        <p id="daily-desc" class="text-slate-600 text-sm leading-relaxed flex-grow"></p>
                        <button onclick="generateBedtimeStory()" id="ai-story-btn" class="ai-btn w-full py-3 px-4 mt-6 shadow-lg">✨ 生成今日床邊故事</button>
                        <div id="ai-story-output" class="ai-box hidden"></div>
                    </div>
                    <div class="lg:col-span-2 border rounded-2xl overflow-hidden h-[400px]">
                        <div id="dailyMap" style="width: 100%; height: 100%;"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section: Table -->
        <section id="sec-table" class="fade-in hidden">
            <div class="bg-white rounded-2xl shadow-md overflow-hidden border">
                <table class="w-full divide-y">
                    <thead class="bg-slate-100 hidden sm:table-header-group text-xs font-bold text-slate-500 uppercase">
                        <tr><th class="px-4 py-3 text-left">日期</th><th class="px-4 py-3 text-left">地點</th><th class="px-4 py-3 text-left">行程</th><th class="px-4 py-3 text-left">氣候</th><th class="px-4 py-3 text-left">住宿</th></tr>
                    </thead>
                    <tbody id="itinerary-tbody" class="bg-white divide-y"></tbody>
                </table>
            </div>
        </section>

        <!-- Section: Stay -->
        <section id="sec-stay" class="fade-in hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow border-t-4 border-blue-500"><h3 class="font-bold text-blue-900">紐家1：基督城</h3><p class="text-xs mt-2">共 6 晚。大採買與最後整備基地。</p></div>
                <div class="bg-white p-6 rounded-2xl shadow border-t-4 border-indigo-500"><h3 class="font-bold text-indigo-900">紐家2：蒂卡波</h3><p class="text-xs mt-2">連住 2 晚。星空下的冰川探秘基地。</p></div>
                <div class="bg-white p-6 rounded-2xl shadow border-t-4 border-cyan-500"><h3 class="font-bold text-cyan-900">紐家3：瓦納卡</h3><p class="text-xs mt-2">霸氣連住 6 晚。此行最核心的靜心慢活基地。</p></div>
            </div>
        </section>

        <!-- Section: Food -->
        <section id="sec-food" class="fade-in hidden">
            <div class="bg-white rounded-2xl shadow-md p-8">
                <h2 class="font-bold mb-4">🍽️ 少爺家族餐飲顧問</h2>
                <div class="flex flex-col sm:flex-row gap-3 mb-6">
                    <input type="text" id="ai-food-input" placeholder="在瓦納卡適合 11 人的餐廳？" class="flex-grow px-4 py-3 border rounded-xl">
                    <button onclick="askFoodAssistant()" class="ai-btn px-8 py-3">送出詢問</button>
                </div>
                <div id="ai-food-output" class="ai-box hidden"></div>
            </div>
        </section>
    </main>

    <script>
        const apiKey = "AIzaSyBinuUFRQrAkrlONyRKWazl1hA-AyF8mKE"; 

        const itineraryData = [
            { day: "Day 1", date: "8/8", loc: "基督城 (CHC)", act: "14:25 抵達。取車後前往大型 Pak'nSave 超市大採買。", stay: "紐家1: 基督城", path: [[-43.53, 172.63]] },
            { day: "Day 2", date: "8/9", loc: "Castle Hill", act: "【巨石陣】大自然巨石攀爬。下午皇家空軍博物館看戰機。", stay: "紐家1: 基督城", path: [[-43.53, 172.63], [-43.22, 171.71], [-43.53, 172.63]] },
            { day: "Day 3", date: "8/10", loc: "蒂卡波 (Tekapo)", act: "前往紐家2。下午雪地 Tubing 與溫泉。", stay: "紐家2: 蒂卡波", path: [[-43.53, 172.63], [-44.00, 170.47]] },
            { day: "Day 4", date: "8/11", loc: "庫克山 (Mt Cook)", act: "胡克谷步道吊橋，觸摸冰河浮冰。", stay: "紐家2: 蒂卡波", path: [[-44.00, 170.47], [-43.73, 170.09], [-44.00, 170.47]] },
            { day: "Day 5", date: "8/12", loc: "瓦納卡 (Wanaka)", act: "進駐最核心據點紐家3。下午別墅靜心閒置。", stay: "紐家3: 瓦納卡", path: [[-44.00, 170.47], [-44.69, 169.14]] },
            { day: "Day 6", date: "8/13", loc: "Snow Farm", act: "【狗拉雪橇】哈士奇體驗，與狗狗拍照。", stay: "紐家3: 瓦納卡", path: [[-44.69, 169.14], [-44.87, 169.09], [-44.69, 169.14]] },
            { day: "Day 7", date: "8/14", loc: "皇后鎮 (QT)", act: "搭百年蒸汽船至對岸牧場看剪羊毛秀。", stay: "紐家3: 瓦納卡", path: [[-44.69, 169.14], [-45.03, 168.66], [-44.69, 169.14]] },
            { day: "Day 8", date: "8/15", loc: "卡德羅納 (Cardrona)", act: "【安全滑雪】接駁巴士上山，體驗封閉魔毯。", stay: "紐家3: 瓦納卡", path: [[-44.69, 169.14], [-44.89, 168.94], [-44.69, 169.14]] },
            { day: "Day 9", date: "8/16", loc: "皇后鎮 (QT)", act: "開車上鹿園高地餵動物。逛淘金箭鎮。", stay: "紐家3: 瓦納卡", path: [[-44.69, 169.14], [-45.04, 168.74], [-44.69, 169.14]] },
            { day: "Day 10", date: "8/17", loc: "瓦納卡 (Wanaka)", act: "湖畔看孤樹。逛薰衣草農場看羊駝。", stay: "紐家3: 瓦納卡", path: [[-44.69, 169.14]] },
            { day: "Day 11", date: "8/18", loc: "移動/基督城", act: "【大返程】中途在 Geraldine 休息。", stay: "紐家1: 基督城", path: [[-44.69, 169.14], [-43.53, 172.63]] },
            { day: "Day 12", date: "8/19", loc: "阿卡羅阿 (Akaroa)", act: "法式風情小鎮。海景羊駝合影。", stay: "紐家1: 基督城", path: [[-43.53, 172.63], [-43.80, 172.96], [-43.53, 172.63]] },
            { day: "Day 13", date: "8/20", loc: "基督城市區", act: "超大溜滑梯。野生動物園看奇異鳥。", stay: "紐家1: 基督城", path: [[-43.53, 172.63]] },
            { day: "Day 14", date: "8/21", loc: "最後採買", act: "市區採買、整理行李、圓滿慶祝。", stay: "紐家1: 基督城", path: [[-43.53, 172.63]] },
            { day: "Day 15", date: "8/22", loc: "歸途", act: "機場還車。06:45 搭機賦歸。", stay: "機上", path: [[-43.53, 172.63]] }
        ];

        let overviewMap = null, dailyMap = null, dailyLayerGroup = null, currentDayIndex = 0;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            ['map', 'daily', 'table', 'stay', 'food'].forEach(sec => document.getElementById('sec-' + sec).classList.add('hidden'));
            document.getElementById('sec-' + tabId).classList.remove('hidden');
            if(tabId === 'map') { if(!overviewMap) initOverviewMap(); setTimeout(() => overviewMap.invalidateSize(), 200); }
            if(tabId === 'daily') { if(!dailyMap) initDailyMap(); setTimeout(() => { dailyMap.invalidateSize(); renderDailyMap(currentDayIndex); }, 200); }
        }

        async function callGeminiAPI(prompt) {
            // ✨ 重要修正：使用 v1beta 版本並確保網址拼寫正確
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    parts: [{ text: "請扮演一個溫柔的說書人或紐西蘭導遊。以下是提問：" + prompt }]
                }]
            };

            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) {
                    const errData = await response.json();
                    return `⚠️ 發生錯誤 (${response.status})：${errData.error?.message || "原因不明，請檢查金鑰限制。"}`;
                }
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "AI 暫無回應";
            } catch (e) { return "❌ 連接失敗：" + e.message; }
        }

        function buildUI() {
            const tbody = document.getElementById('itinerary-tbody');
            const selector = document.getElementById('day-selector-container');
            itineraryData.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `<td class="px-4 py-3 text-sm font-bold">${item.day}</td><td class="px-4 py-3 text-sm font-bold">${item.loc}</td><td class="px-4 py-3 text-sm text-slate-600">${item.act}</td><td class="px-4 py-3 text-xs text-slate-400">適時保暖</td><td class="px-4 py-3 text-xs font-bold text-blue-600">${item.stay}</td>`;
                tbody.appendChild(row);
                const btn = document.createElement('button');
                btn.className = "day-selector-btn flex-shrink-0 px-4 py-2 border rounded-xl text-xs font-bold bg-white";
                btn.innerText = item.day;
                btn.onclick = () => selectDay(index, btn);
                selector.appendChild(btn);
            });
        }

        function selectDay(index, btn) {
            currentDayIndex = index;
            document.querySelectorAll('.day-selector-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const d = itineraryData[index];
            document.getElementById('daily-badge').innerText = d.day + " (" + (d.date || "") + ")";
            document.getElementById('daily-title').innerText = d.loc;
            document.getElementById('daily-desc').innerText = d.act;
            renderDailyMap(index);
        }

        async function generateBedtimeStory() {
            const btn = document.getElementById('ai-story-btn');
            const out = document.getElementById('ai-story-output');
            btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> 故事編織中...`;
            const prompt = "根據這段行程寫一個200字內的床邊故事：" + itineraryData[currentDayIndex].act;
            const res = await callGeminiAPI(prompt);
            out.innerHTML = res.replace(/\n/g, '<br>');
            out.classList.remove('hidden');
            btn.disabled = false; btn.innerHTML = "✨ 重新生成";
        }

        async function askFoodAssistant() {
            const q = document.getElementById('ai-food-input').value;
            const out = document.getElementById('ai-food-output');
            if(!q) return;
            const res = await callGeminiAPI("針對紐西蘭家族11人旅行，回答這個問題：" + q);
            out.innerHTML = res.replace(/\n/g, '<br>');
            out.classList.remove('hidden');
        }

        function initOverviewMap() {
            overviewMap = L.map('overviewMap', { scrollWheelZoom: false }).setView([-44.2, 170.5], 6);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}').addTo(overviewMap);
            L.marker([-43.53, 172.63]).addTo(overviewMap).bindTooltip('紐家1');
            L.marker([-44.00, 170.47]).addTo(overviewMap).bindTooltip('紐家2');
            L.marker([-44.69, 169.14]).addTo(overviewMap).bindTooltip('紐家3');
        }

        function initDailyMap() {
            dailyMap = L.map('dailyMap', { scrollWheelZoom: false });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png').addTo(dailyMap);
            dailyLayerGroup = L.layerGroup().addTo(dailyMap);
        }

        function renderDailyMap(index) {
            if(!dailyLayerGroup) return;
            dailyLayerGroup.clearLayers();
            const p = itineraryData[index].path;
            const l = L.polyline(p, { color:'#3b82f6', weight:4 }).addTo(dailyLayerGroup);
            dailyMap.fitBounds(l.getBounds(), { padding:[50,50] });
            p.forEach(pt => L.marker(pt).addTo(dailyLayerGroup));
        }

        window.onload = () => { buildUI(); selectDay(0, document.querySelector('.day-selector-btn')); switchTab('map'); };
    </script>
</body>
</html>
